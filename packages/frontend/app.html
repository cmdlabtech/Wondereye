<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wondereye</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Even Roster Grotesk', system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0;
      padding: 24px 16px;
      min-height: 100vh;
    }

    .app-name {
      font-size: 20px;
      font-weight: 400;
      opacity: 0.6;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .dot.active { background: #4ade80; }
    .dot.loading { background: #facc15; }

    .row-labels { flex: 1; }

    .row-label {
      font-size: 15px;
      opacity: 0.45;
      margin-bottom: 2px;
    }

    .row-value {
      font-size: 20px;
    }

    .setup-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .setup-label {
      font-size: 15px;
      opacity: 0.45;
      margin-bottom: 10px;
    }

    .setup-url-box {
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      word-break: break-all;
      font-size: 17px;
      user-select: text;
      -webkit-user-select: text;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    .setup-url-box:active {
      background: rgba(255,255,255,0.06);
    }

    .setup-url-box.copied {
      border-color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.08);
    }

    .setup-hint {
      font-size: 14px;
      opacity: 0.35;
      margin-top: 10px;
      line-height: 1.5;
    }

    .history-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .history-section-label {
      font-size: 15px;
      opacity: 0.45;
      margin-bottom: 10px;
    }

    .history-entry {
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .history-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .history-name {
      font-size: 17px;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-type {
      font-size: 12px;
      opacity: 0.45;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .history-date {
      font-size: 13px;
      opacity: 0.35;
      flex-shrink: 0;
    }

    .history-snippet {
      font-size: 14px;
      opacity: 0.45;
      line-height: 1.4;
    }

    .units-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .units-label {
      font-size: 15px;
      opacity: 0.45;
      margin-bottom: 10px;
    }

    .units-toggle {
      display: flex;
      gap: 8px;
    }

    .units-btn {
      flex: 1;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      font-size: 17px;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-align: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .units-btn.active {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }

    .units-btn:active {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="app-name">Wondereye</div>

  <div class="status-row">
    <div class="dot loading" id="connection-dot"></div>
    <div class="row-labels">
      <div class="row-label">Glasses</div>
      <div class="row-value" id="connection-status">Connecting...</div>
    </div>
  </div>

  <div class="status-row">
    <div class="dot" id="location-dot"></div>
    <div class="row-labels">
      <div class="row-label">Location</div>
      <div class="row-value" id="location-status">Waiting...</div>
    </div>
  </div>

  <div class="setup-section" id="setup-section" style="display:none">
    <div class="setup-label">Update location from your phone's browser <em>(tap to copy)</em></div>
    <div class="setup-url-box" id="setup-url"></div>
  </div>

  <div class="units-section">
    <div class="units-label">Units</div>
    <div class="units-toggle">
      <button class="units-btn" id="units-imperial">Imperial</button>
      <button class="units-btn" id="units-metric">Metric</button>
    </div>
  </div>

  <div class="history-section" id="history-section" style="display:none">
    <div class="history-section-label">Recently viewed</div>
    <div id="history-list"></div>
  </div>

  <script src="/app-ui.js"></script>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
