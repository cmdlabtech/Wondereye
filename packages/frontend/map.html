<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wondereye — Landmark Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    header a {
      font-size: 0.85rem;
      color: #555;
      text-decoration: none;
    }
    header a:hover { color: #aaa; }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
    }
    #count {
      margin-left: auto;
      font-size: 0.8rem;
      color: #555;
    }
    #map {
      flex: 1;
    }
  </style>
</head>
<body>
  <header>
    <a href="/">&larr; Wondereye</a>
    <h1>Landmark Map</h1>
    <span id="count"></span>
  </header>
  <div id="map"></div>
  <script type="module" src="/src/map.ts"></script>
</body>
</html>
